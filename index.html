<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabberwocky - Eye Tracking Demo</title>
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #f4ecd8;
      min-height: 100vh;
      padding: 60px;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    
    #container {
      max-width: 700px;
      margin: 0 auto;
    }
    
    h1 {
      color: #2c2416;
      text-align: center;
      font-size: 32px;
      margin-bottom: 40px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: normal;
      border-bottom: 1px solid #d4c9b0;
      padding-bottom: 20px;
    }
    
    #poem {
      font-size: 18px;
      line-height: 2.2;
      color: #3d3d3d;
      text-align: left;
    }
    
    .word {
      display: inline-block;
      transition: all 0.4s ease;
      margin: 3px;
      padding: 2px 4px;
    }
    
    .word.focused {
      color: #8b0000;
      font-size: 26px;
      transform: scale(1.15);
      font-weight: bold;
    }
    
    .word.unfocused {
      color: #a0a0a0;
    }
    
    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #8b0000;
      font-size: 14px;
      background: #f4ecd8;
      padding: 10px 15px;
      border: 1px solid #d4c9b0;
      border-radius: 4px;
    }
    
    #calibration {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #f4ecd8;
      color: #2c2416;
      padding: 20px;
      border: 1px solid #d4c9b0;
      border-radius: 4px;
      font-size: 14px;
      max-width: 350px;
      line-height: 1.6;
    }
    
    canvas#webgazerVideoFeed {
      position: fixed !important;
      top: 20px !important;
      left: 20px !important;
      width: 200px !important;
      border-radius: 8px;
      opacity: 0.6;
      border: 2px solid #8b0000 !important;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  
  <div id="container">
    <h1>Jabberwocky</h1>
    <div id="poem"></div>
  </div>
  
  <div id="calibration">
    <strong>Eye Tracking Active</strong><br>
    Look at the words - the one you're focusing on will highlight.<br>
    <small>Click a few times around the page to calibrate.</small>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutWithLines } from './pretext.js';

    const TEXT = `'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe."

"Beware the Jabberwock, my son!
The jaws that bite, the claws that catch!
Beware the Jubjub bird, and shun
The frumious Bandersnatch!"

He took his vorpal sword in hand;
Long time the manxome foe he sought—
So rested he by the Tumtum tree
And stood awhile in thought.

And, as in uffish thought he stood,
The Jabberwock, with eyes of flame,
Came whiffling through the tulgey wood,
And burbled as it came!

One, two! One, two! And through and through
The vorpal blade went snicker-snack!
He left it dead, and with its head
He went galumphing back.

"And hast thou slain the Jabberwock?
Come to my arms, my beamish boy!
O frabjous day! Callooh! Callay!"
He chortled in his joy.

'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe.`;

    const FONT = '20px Georgia, "Times New Roman", serif';
    const LINE_HEIGHT = 48;

    const poemEl = document.getElementById('poem');
    const statusEl = document.getElementById('status');
    const calibrationEl = document.getElementById('calibration');

    function getMaxWidth() {
      return 650;
    }

    const prepared = prepareWithSegments(TEXT, FONT, { whiteSpace: 'pre-wrap' });
    const { lines } = layoutWithLines(prepared, getMaxWidth(), LINE_HEIGHT);

    const wordElements = [];

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      const words = line.text.split(/(\s+)/);
      const lineDiv = document.createElement('div');
      lineDiv.style.marginBottom = '24px';
      
      for (let wi = 0; wi < words.length; wi++) {
        const wordText = words[wi];
        if (wordText.trim() === '') {
          lineDiv.appendChild(document.createTextNode(wordText));
          continue;
        }
        
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word unfocused';
        wordSpan.textContent = wordText;
        lineDiv.appendChild(wordSpan);
        
        wordElements.push({
          element: wordSpan,
          text: wordText,
          rect: null
        });
      }
      
      poemEl.appendChild(lineDiv);
    }

    setTimeout(() => {
      for (const word of wordElements) {
        word.rect = word.element.getBoundingClientRect();
      }
    }, 500);

    let lastUpdate = 0;

    webgazer
      .setGazeListener((data, timestamp) => {
        if (data == null) return;
        
        const now = Date.now();
        if (now - lastUpdate < 100) return;
        lastUpdate = now;
        
        statusEl.textContent = `Watching: ${Math.round(data.x)}, ${Math.round(data.y)}`;
        
        let closestWord = null;
        let closestDistance = Infinity;
        
        for (const word of wordElements) {
          if (!word.rect) continue;
          
          const centerX = word.rect.left + word.rect.width / 2;
          const centerY = word.rect.top + word.rect.height / 2;
          
          const distance = Math.hypot(data.x - centerX, data.y - centerY);
          
          if (distance < closestDistance && distance < 100) {
            closestDistance = distance;
            closestWord = word;
          }
        }
        
        for (const word of wordElements) {
          if (word === closestWord) {
            word.element.classList.add('focused');
            word.element.classList.remove('unfocused');
          } else {
            word.element.classList.remove('focused');
            word.element.classList.add('unfocused');
          }
        }
      })
      .saveDataAcrossSessions(true)
      .begin();
    
    webgazer.on('start', () => {
      statusEl.textContent = 'Eye tracking active';
    });
    
    webgazer.on('ready', () => {
      statusEl.textContent = 'Look at the words';
    });

    setTimeout(() => {
      calibrationEl.style.display = 'none';
    }, 10000);
    
    window.addEventListener('resize', () => {
      setTimeout(() => {
        for (const word of wordElements) {
          word.rect = word.element.getBoundingClientRect();
        }
      }, 100);
    });
  </script>
</body>
</html>
