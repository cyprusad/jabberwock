<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabberwocky - Scramble Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #f4ecd8;
      min-height: 100vh;
      padding: 60px;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    
    #container {
      max-width: 700px;
      margin: 0 auto;
    }
    
    h1 {
      color: #2c2416;
      text-align: center;
      font-size: 32px;
      margin-bottom: 40px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: normal;
      border-bottom: 1px solid #d4c9b0;
      padding-bottom: 20px;
    }
    
    #poem {
      font-size: 18px;
      line-height: 2.4;
      color: #000;
      text-align: left;
    }
    
    .line {
      margin-bottom: 20px;
      transition: all 0.5s ease;
    }
    
    .word {
      display: inline-block;
      transition: all 0.3s ease;
      margin: 2px;
      padding: 2px 3px;
    }
    
    .word.highlight {
      color: #8b0000;
      font-size: 26px;
      transform: scale(1.15);
      font-weight: bold;
    }
    
    .word.scramble {
      color: #666;
      transition: all 0.4s ease;
    }
    
    .word.scramble-25 {
      transform: translateX(3px) rotate(2deg);
    }
    
    .word.scramble-50 {
      transform: translateX(-4px) rotate(-2deg);
    }
    
    .word.scramble-75 {
      transform: translateX(6px) rotate(3deg);
    }
    
    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #8b0000;
      font-size: 14px;
      background: #f4ecd8;
      padding: 10px 15px;
      border: 1px solid #d4c9b0;
      border-radius: 4px;
    }
    
    #cursor-dot {
      position: fixed;
      width: 16px;
      height: 16px;
      background: #8b0000;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    #cursor-dot.active {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="status">Hover over words</div>
  <div id="cursor-dot"></div>
  
  <div id="container">
    <h1>Jabberwocky</h1>
    <div id="poem"></div>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutWithLines } from './pretext.js';

    const TEXT = `'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe."

"Beware the Jabberwock, my son!
The jaws that bite, the claws that catch!
Beware the Jubjub bird, and shun
The frumious Bandersnatch!"

He took his vorpal sword in hand;
Long time the manxome foe he sought—
So rested he by the Tumtum tree
And stood awhile in thought.

And, as in uffish thought he stood,
The Jabberwock, with eyes of flame,
Came whiffling through the tulgey wood,
And burbled as it came!

One, two! One, two! And through and through
The vorpal blade went snicker-snack!
He left it dead, and with its head
He went galumphing back.

"And hast thou slain the Jabberwock?
Come to my arms, my beamish boy!
O frabjous day! Callooh! Callay!"
He chortled in his joy.

'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe.`;

    const FONT = '20px Georgia, "Times New Roman", serif';
    const LINE_HEIGHT = 48;

    const poemEl = document.getElementById('poem');
    const statusEl = document.getElementById('status');
    const cursorDot = document.getElementById('cursor-dot');

    function getMaxWidth() {
      return 650;
    }

    const prepared = prepareWithSegments(TEXT, FONT, { whiteSpace: 'pre-wrap' });
    const { lines } = layoutWithLines(prepared, getMaxWidth(), LINE_HEIGHT);

    const linesData = [];

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      const words = line.text.split(/(\s+)/);
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      
      const lineWords = [];
      
      for (let wi = 0; wi < words.length; wi++) {
        const wordText = words[wi];
        if (wordText.trim() === '') {
          lineDiv.appendChild(document.createTextNode(wordText));
          continue;
        }
        
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word';
        wordSpan.textContent = wordText;
        lineDiv.appendChild(wordSpan);
        
        lineWords.push(wordSpan);
      }
      
      poemEl.appendChild(lineDiv);
      
      linesData.push({
        element: lineDiv,
        words: lineWords,
        originalTexts: lineWords.map(w => w.textContent)
      });
    }

    function shuffleWord(text, percent) {
      if (text.length < 2 || text.trim() === '') return text;
      
      const letters = text.split('');
      const numToShuffle = Math.ceil(letters.length * percent);
      
      for (let i = 0; i < numToShuffle; i++) {
        const idx1 = Math.floor(Math.random() * letters.length);
        const idx2 = Math.floor(Math.random() * letters.length);
        
        const temp = letters[idx1];
        letters[idx1] = letters[idx2];
        letters[idx2] = temp;
      }
      
      return letters.join('');
    }
    
    function restoreWord(wordEl, originalText) {
      wordEl.textContent = originalText;
    }

    let currentLineIndex = -1;

    document.addEventListener('mousemove', (e) => {
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
      cursorDot.classList.add('active');
      
      let closestWord = null;
      let closestLineIndex = -1;
      let closestDistance = Infinity;
      
      for (let li = 0; li < linesData.length; li++) {
        for (const wordEl of linesData[li].words) {
          const rect = wordEl.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          
          const distance = Math.hypot(e.clientX - centerX, e.clientY - centerY);
          
          if (distance < closestDistance && distance < 80) {
            closestDistance = distance;
            closestWord = wordEl;
            closestLineIndex = li;
          }
        }
      }
      
      if (closestLineIndex !== currentLineIndex) {
        currentLineIndex = closestLineIndex;
        
        for (let li = 0; li < linesData.length; li++) {
          const line = linesData[li];
          const distance = Math.abs(li - currentLineIndex);
          
          let scramblePercent = 0;
          if (currentLineIndex >= 0) {
            if (li < currentLineIndex) {
              scramblePercent = (currentLineIndex - li) * 0.25;
            } else if (li > currentLineIndex) {
              scramblePercent = (li - currentLineIndex) * 0.25;
            }
          }
          
          for (let wi = 0; wi < line.words.length; wi++) {
            const wordEl = line.words[wi];
            const original = line.originalTexts[wi];
            
              if (distance === 0 && wordEl === closestWord) {
                wordEl.classList.add('highlight');
                wordEl.classList.remove('scramble', 'scramble-25', 'scramble-50', 'scramble-75');
                wordEl.textContent = original;
              } else if (scramblePercent > 0) {
                wordEl.classList.remove('highlight');
                wordEl.classList.add('scramble');
                
                if (scramblePercent <= 0.25) {
                  wordEl.classList.add('scramble-25');
                } else if (scramblePercent <= 0.5) {
                  wordEl.classList.add('scramble-50');
                } else {
                  wordEl.classList.add('scramble-75');
                }
                
                wordEl.textContent = shuffleWord(original, scramblePercent);
              } else {
                wordEl.classList.remove('highlight', 'scramble', 'scramble-25', 'scramble-50', 'scramble-75');
                wordEl.textContent = original;
              }
          }
        }
      }
      
      if (closestWord) {
        statusEl.textContent = `Line ${closestLineIndex + 1}`;
      }
    });
  </script>
</body>
</html>
