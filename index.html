<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabberwocky - Eye Tracking Demo</title>
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #f4ecd8;
      min-height: 100vh;
      padding: 60px;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    
    #container {
      max-width: 700px;
      margin: 0 auto;
    }
    
    h1 {
      color: #2c2416;
      text-align: center;
      font-size: 32px;
      margin-bottom: 40px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: normal;
      border-bottom: 1px solid #d4c9b0;
      padding-bottom: 20px;
    }
    
    #poem {
      font-size: 18px;
      line-height: 2.2;
      color: #000;
      text-align: left;
    }
    
    .word {
      display: inline-block;
      transition: all 0.4s ease;
      margin: 3px;
      padding: 2px 4px;
    }
    
    .word.focused {
      color: #8b0000;
      font-size: 26px;
      transform: scale(1.15);
      font-weight: bold;
    }
    
    .word.unfocused {
      color: #000;
    }
    
    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #2c2416;
      font-size: 14px;
      background: #f4ecd8;
      padding: 10px 15px;
      border: 1px solid #d4c9b0;
      border-radius: 4px;
    }
    
    #calibration-box {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #f4ecd8;
      color: #2c2416;
      padding: 20px;
      border: 2px solid #8b0000;
      border-radius: 8px;
      font-size: 16px;
      max-width: 400px;
      text-align: center;
      z-index: 100;
    }
    
    canvas#webgazerVideoFeed {
      display: none !important;
    }
    
    #eye-dot {
      position: fixed;
      width: 14px;
      height: 14px;
      background: #8b0000;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
      box-shadow: 0 0 8px #8b0000;
      display: none;
    }
    
    #eye-dot.active {
      display: block;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="status">Click to start</div>
  <div id="eye-dot"></div>
  <div id="calibration-box">
    <strong>Click anywhere to start</strong><br>
    Eye tracking needs webcam access.<br>
    If it doesn't work, the highlight will follow your mouse.
  </div>
  
  <div id="container">
    <h1>Jabberwocky</h1>
    <div id="poem"></div>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutWithLines } from './pretext.js';

    const TEXT = `'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe."

"Beware the Jabberwock, my son!
The jaws that bite, the claws that catch!
Beware the Jubjub bird, and shun
The frumious Bandersnatch!"

He took his vorpal sword in hand;
Long time the manxome foe he sought—
So rested he by the Tumtum tree
And stood awhile in thought.

And, as in uffish thought he stood,
The Jabberwock, with eyes of flame,
Came whiffling through the tulgey wood,
And burbled as it came!

One, two! One, two! And through and through
The vorpal blade went snicker-snack!
He left it dead, and with its head
He went galumphing back.

"And hast thou slain the Jabberwock?
Come to my arms, my beamish boy!
O frabjous day! Callooh! Callay!"
He chortled in his joy.

'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe.`;

    const FONT = '20px Georgia, "Times New Roman", serif';
    const LINE_HEIGHT = 48;

    const poemEl = document.getElementById('poem');
    const statusEl = document.getElementById('status');
    const calibrationBoxEl = document.getElementById('calibration-box');
    const eyeDot = document.getElementById('eye-dot');

    function getMaxWidth() {
      return 650;
    }

    const prepared = prepareWithSegments(TEXT, FONT, { whiteSpace: 'pre-wrap' });
    const { lines } = layoutWithLines(prepared, getMaxWidth(), LINE_HEIGHT);

    const wordElements = [];

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      const words = line.text.split(/(\s+)/);
      const lineDiv = document.createElement('div');
      lineDiv.style.marginBottom = '24px';
      
      for (let wi = 0; wi < words.length; wi++) {
        const wordText = words[wi];
        if (wordText.trim() === '') {
          lineDiv.appendChild(document.createTextNode(wordText));
          continue;
        }
        
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word';
        wordSpan.textContent = wordText;
        lineDiv.appendChild(wordSpan);
        
        wordElements.push({
          element: wordSpan,
          text: wordText,
          rect: null
        });
      }
      
      poemEl.appendChild(lineDiv);
    }

    setTimeout(() => {
      for (const word of wordElements) {
        word.rect = word.element.getBoundingClientRect();
      }
    }, 500);

    let useMouseFallback = false;
    let lastX = 0, lastY = 0;

    function updateFocus(x, y) {
      statusEl.textContent = `Tracking at: ${Math.round(x)}, ${Math.round(y)}`;
      
      eyeDot.style.left = (x - 7) + 'px';
      eyeDot.style.top = (y - 7) + 'px';
      eyeDot.classList.add('active');
      
      let closestWord = null;
      let closestDistance = Infinity;
      
      for (const word of wordElements) {
        if (!word.rect) continue;
        
        const centerX = word.rect.left + word.rect.width / 2;
        const centerY = word.rect.top + word.rect.height / 2;
        
        const distance = Math.hypot(x - centerX, y - centerY);
        
        if (distance < closestDistance && distance < 120) {
          closestDistance = distance;
          closestWord = word;
        }
      }
      
      for (const word of wordElements) {
        if (word === closestWord) {
          word.element.classList.add('focused');
        } else {
          word.element.classList.remove('focused');
        }
      }
    }

    function startTracking() {
      calibrationBoxEl.innerHTML = '<strong>Calibrating...</strong><br>Click on words to help the tracker learn.<br>Or just move your mouse around.';
      
      try {
        webgazer
          .setGazeListener((data, timestamp) => {
            if (data == null) return;
            updateFocus(data.x, data.y);
          })
          .saveDataAcrossSessions(true)
          .begin();
        
        webgazer.on('start', () => {
          calibrationBoxEl.innerHTML = '<strong>Eye tracking active!</strong><br>Look at the words - they will highlight.';
          setTimeout(() => { calibrationBoxEl.style.display = 'none'; }, 5000);
        });
      } catch (e) {
        console.log('Eye tracking failed, using mouse:', e);
        useMouseFallback = true;
      }
    }

    document.addEventListener('click', (e) => {
      if (!window.webgazer) {
        return;
      }
      
      if (!window.webgazer.isReady()) {
        startTracking();
      }
      
      // Show video briefly for calibration
      const video = document.querySelector('#webgazerVideoFeed');
      if (video) {
        video.style.display = 'block';
        video.style.position = 'fixed';
        video.style.bottom = '10px';
        video.style.right = '10px';
        video.style.width = '160px';
        video.style.opacity = '0.7';
        video.style.border = '2px solid #8b0000';
        setTimeout(() => { video.style.display = 'none'; }, 3000);
      }
    });

    document.addEventListener('mousemove', (e) => {
      lastX = e.clientX;
      lastY = e.clientY;
      
      // Use mouse as immediate feedback while waiting for eye tracking
      if (!eyeDot.classList.contains('active')) {
        updateFocus(e.clientX, e.clientY);
      }
    });

    // Check if WebGazer loaded
    if (typeof webgazer === 'undefined') {
      statusEl.textContent = 'WebGazer not loaded - using mouse';
      useMouseFallback = true;
    }
  </script>
</body>
</html>
