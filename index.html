<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabberwocky - Scramble Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #f4ecd8;
      min-height: 100vh;
      padding: 60px;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    
    #container {
      max-width: 700px;
      margin: 0 auto;
    }
    
    h1 {
      color: #2c2416;
      text-align: center;
      font-size: 32px;
      margin: 40px 0;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: normal;
      border-bottom: 1px solid #d4c9b0;
      padding: 20px 0;
      position: sticky;
      top: 0;
      background: #f4ecd8;
      z-index: 100;
    }
    
    #poem {
      font-size: 18px;
      line-height: 2.4;
      color: #000;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    #poem.visible {
      opacity: 1;
    }
    
    .line {
      margin-bottom: 20px;
      transition: all 0.5s ease;
    }
    
    .word {
      display: inline-block;
      transition: all 0.3s ease;
      margin: 2px;
      padding: 2px 3px;
    }
    
    .word.highlight {
      color: #8b0000;
      font-size: 26px;
      transform: scale(1.15);
      font-weight: bold;
    }
    
    .word.scramble {
      color: #888;
      transition: all 0.4s ease;
    }
    
    .word.scramble-25 {
      color: #444;
      transform: translateX(3px) rotate(2deg);
    }
    
    .word.scramble-50 {
      color: #666;
      transform: translateX(-4px) rotate(-2deg);
    }
    
    .word.scramble-75 {
      color: #888;
      transform: translateX(6px) rotate(3deg);
    }
    
    #calibration-prompt {
      font-size: 18px;
      color: #8b0000;
      font-weight: bold;
    }
    
    #gaze-status {
      font-size: 14px;
      color: #228b22;
    }
    
    #calibration-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
    
    .calibration-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #8b0000;
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
      transform: translate(-50%, -50%);
    }
    
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.4; }
    }
    
    #calibration-overlay.active {
      pointer-events: auto;
      cursor: crosshair;
    }
    
    #cursor-dot {
      position: fixed;
      width: 16px;
      height: 16px;
      background: #8b0000;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    #cursor-dot.active {
      opacity: 0.7;
    }
  </style>
  <script src="webgazer.js" onload="window.webgazerLoaded = true;" onerror="window.webgazerLoaded = false;"></script>
</head>
<body>
  <div id="status">
    <div id="calibration-prompt">Click on dots to calibrate, then look around!</div>
    <div id="gaze-status" style="display:none;">Eye tracking active</div>
  </div>
  <div id="cursor-dot"></div>
  <div id="calibration-overlay"></div>
  
  <div id="container">
    <h1>Jabberwocky</h1>
    <div id="poem"></div>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutWithLines } from './pretext.js';

    const TEXT = `'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe."

"Beware the Jabberwock, my son!
The jaws that bite, the claws that catch!
Beware the Jubjub bird, and shun
The frumious Bandersnatch!"

He took his vorpal sword in hand;
Long time the manxome foe he sought—
So rested he by the Tumtum tree
And stood awhile in thought.

And, as in uffish thought he stood,
The Jabberwock, with eyes of flame,
Came whiffling through the tulgey wood,
And burbled as it came!

One, two! One, two! And through and through
The vorpal blade went snicker-snack!
He left it dead, and with its head
He went galumphing back.

"And hast thou slain the Jabberwock?
Come to my arms, my beamish boy!
O frabjous day! Callooh! Callay!"
He chortled in his joy.

'Twas brillig, and the slithy toves
Did gyre and gimble in the wabe:
All mimsy were the borogoves,
And the mome raths outgrabe.`;

    const FONT = '20px Georgia, "Times New Roman", serif';
    const LINE_HEIGHT = 48;

    const poemEl = document.getElementById('poem');
    const statusEl = document.getElementById('status');
    const cursorDot = document.getElementById('cursor-dot');
    const calibrationOverlay = document.getElementById('calibration-overlay');
    const calibrationPrompt = document.getElementById('calibration-prompt');
    const gazeStatus = document.getElementById('gaze-status');

    let useEyeTracking = false;
    let gazeX = 0;
    let gazeY = 0;
    let calibrationPoints = [];
    let calibrationIndex = 0;
    let calibrationPhase = false;

    // Smoothing for eye tracking - average recent positions
    const gazeHistory = [];
    const SMOOTHING_WINDOW = 10;
    
    function smoothGaze(x, y) {
      gazeHistory.push({ x, y });
      if (gazeHistory.length > SMOOTHING_WINDOW) {
        gazeHistory.shift();
      }
      const avgX = gazeHistory.reduce((sum, p) => sum + p.x, 0) / gazeHistory.length;
      const avgY = gazeHistory.reduce((sum, p) => sum + p.y, 0) / gazeHistory.length;
      return { x: avgX, y: avgY };
    }

    const calibrationPositions = [
      { x: 0.1, y: 0.1 }, { x: 0.5, y: 0.1 }, { x: 0.9, y: 0.1 },
      { x: 0.1, y: 0.5 }, { x: 0.5, y: 0.5 }, { x: 0.9, y: 0.5 },
      { x: 0.1, y: 0.9 }, { x: 0.5, y: 0.9 }, { x: 0.9, y: 0.9 }
    ];

    function showCalibrationPoint() {
      calibrationOverlay.innerHTML = '';
      if (calibrationIndex >= calibrationPositions.length) {
        endCalibration();
        return;
      }

      const pos = calibrationPositions[calibrationIndex];
      const dot = document.createElement('div');
      dot.className = 'calibration-dot';
      dot.style.left = (pos.x * window.innerWidth) + 'px';
      dot.style.top = (pos.y * window.innerHeight) + 'px';
      calibrationOverlay.appendChild(dot);
    }

    function startCalibration() {
      calibrationPhase = true;
      calibrationIndex = 0;
      calibrationOverlay.classList.add('active');
      showCalibrationPoint();

      calibrationOverlay.onclick = (e) => {
        if (calibrationIndex < calibrationPositions.length) {
          calibrationIndex++;
          showCalibrationPoint();
        }
      };
    }

    function endCalibration() {
      calibrationPhase = false;
      calibrationOverlay.classList.remove('active');
      calibrationOverlay.innerHTML = '';
      calibrationPrompt.style.display = 'none';
      gazeStatus.style.display = 'block';
      useEyeTracking = true;
      document.getElementById('poem').classList.add('visible');
    }

    function initWebGazer() {
      console.log('webgazerLoaded:', window.webgazerLoaded);
      console.log('webgazer global:', typeof webgazer);
      
      const webgazerLoaded = window.webgazerLoaded || typeof webgazer !== 'undefined';
      
      if (!webgazerLoaded) {
        console.warn('WebGazer not loaded, falling back to mouse');
        calibrationPrompt.textContent = 'Eye tracking unavailable - move your mouse';
        return;
      }

      webgazer
        .setRegression('weightedRidge')
        .setGazeListener((data, elapsedTime) => {
          if (data) {
            const smoothed = smoothGaze(data.x, data.y);
            gazeX = smoothed.x;
            gazeY = smoothed.y;
          }
        })
        .begin();

      // Enable Kalman filter for smoothing
      webgazer.applyKalmanFilter(true);
      
      webgazer.params.faceMeshSolutionPath = './mediapipe/face_mesh';

      webgazer.showVideoPreview(false)
        .showPredictionPoints(false)
        .showFaceOverlay(false)
        .showFaceFeedbackBox(false);

      console.log('Starting calibration in 1 second...');
      setTimeout(() => {
        console.log('Calling startCalibration...');
        startCalibration();
      }, 1000);
    }

    window.addEventListener('load', initWebGazer);

    function getMaxWidth() {
      return 650;
    }

    const prepared = prepareWithSegments(TEXT, FONT, { whiteSpace: 'pre-wrap' });
    const { lines } = layoutWithLines(prepared, getMaxWidth(), LINE_HEIGHT);

    const linesData = [];

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      const words = line.text.split(/(\s+)/);
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      
      const lineWords = [];
      
      for (let wi = 0; wi < words.length; wi++) {
        const wordText = words[wi];
        if (wordText.trim() === '') {
          lineDiv.appendChild(document.createTextNode(wordText));
          continue;
        }
        
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word';
        wordSpan.textContent = wordText;
        lineDiv.appendChild(wordSpan);
        
        lineWords.push(wordSpan);
      }
      
      poemEl.appendChild(lineDiv);
      
      linesData.push({
        element: lineDiv,
        words: lineWords,
        originalTexts: lineWords.map(w => w.textContent)
      });
    }

    function shuffleWord(text, percent) {
      if (text.length < 2 || text.trim() === '') return text;
      
      const letters = text.split('');
      const numToShuffle = Math.ceil(letters.length * percent);
      
      for (let i = 0; i < numToShuffle; i++) {
        const idx1 = Math.floor(Math.random() * letters.length);
        const idx2 = Math.floor(Math.random() * letters.length);
        
        const temp = letters[idx1];
        letters[idx1] = letters[idx2];
        letters[idx2] = temp;
      }
      
      return letters.join('');
    }
    
    function restoreWord(wordEl, originalText) {
      wordEl.textContent = originalText;
    }

    let currentLineIndex = -1;
    let currentWord = null;
    let lastMousePosition = { x: 0, y: 0 };

    function handleMove(x, y) {
      cursorDot.style.left = x + 'px';
      cursorDot.style.top = y + 'px';
      cursorDot.classList.add('active');
      
      let closestWord = null;
      let closestLineIndex = -1;
      let closestDistance = Infinity;
      
      for (let li = 0; li < linesData.length; li++) {
        for (const wordEl of linesData[li].words) {
          const rect = wordEl.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          
          const distance = Math.hypot(x - centerX, y - centerY);
          
          if (distance < closestDistance && distance < 150) {
            closestDistance = distance;
            closestWord = wordEl;
            closestLineIndex = li;
          }
        }
      }
      
      const lineChanged = closestLineIndex !== currentLineIndex;
      const wordChanged = closestWord !== currentWord;
      
      if (lineChanged || wordChanged) {
        currentLineIndex = closestLineIndex;
        currentWord = closestWord;
      }
      
      if (lineChanged) {
        for (let li = 0; li < linesData.length; li++) {
          const line = linesData[li];
          const distance = Math.abs(li - currentLineIndex);
          
          let scramblePercent = 0;
          if (currentLineIndex >= 0) {
            if (li < currentLineIndex) {
              scramblePercent = (currentLineIndex - li) * 0.25;
            } else if (li > currentLineIndex) {
              scramblePercent = (li - currentLineIndex) * 0.25;
            }
          }
          
          for (let wi = 0; wi < line.words.length; wi++) {
            const wordEl = line.words[wi];
            const original = line.originalTexts[wi];
            
            const colors = ['#000000', '#222222', '#444444', '#666666', '#888888', '#aaaaaa'];
            const color = colors[Math.min(distance, colors.length - 1)];
            
              if (distance === 0 && wordEl === closestWord) {
                wordEl.classList.add('highlight');
                wordEl.classList.remove('scramble', 'scramble-25', 'scramble-50', 'scramble-75');
                wordEl.style.color = '#8b0000';
                wordEl.textContent = original;
              } else if (scramblePercent > 0) {
                wordEl.classList.remove('highlight');
                wordEl.classList.add('scramble');
                wordEl.style.color = color;
                
                if (scramblePercent <= 0.25) {
                  wordEl.classList.add('scramble-25');
                } else if (scramblePercent <= 0.5) {
                  wordEl.classList.add('scramble-50');
                } else {
                  wordEl.classList.add('scramble-75');
                }
                
                wordEl.textContent = shuffleWord(original, scramblePercent);
              } else {
                wordEl.classList.remove('highlight', 'scramble', 'scramble-25', 'scramble-50', 'scramble-75');
                wordEl.style.color = '#000000';
                wordEl.textContent = original;
              }
          }
        }
      } else if (wordChanged && closestWord) {
        const line = linesData[currentLineIndex];
        for (let wi = 0; wi < line.words.length; wi++) {
          const wordEl = line.words[wi];
          const original = line.originalTexts[wi];
          
          if (wordEl === closestWord) {
            wordEl.classList.add('highlight');
            wordEl.classList.remove('scramble', 'scramble-25', 'scramble-50', 'scramble-75');
            wordEl.style.color = '#8b0000';
            wordEl.textContent = original;
          } else {
            wordEl.classList.remove('highlight');
            wordEl.style.color = '#000000';
            wordEl.textContent = original;
          }
        }
      }
      
      if (closestWord) {
        statusEl.textContent = `Line ${closestLineIndex + 1}`;
      }
    }

    document.addEventListener('mousemove', (e) => {
      if (!useEyeTracking) {
        handleMove(e.clientX, e.clientY);
      }
    });

    let gazeUpdateInterval = null;
    if (typeof webgazer !== 'undefined') {
      gazeUpdateInterval = setInterval(() => {
        if (useEyeTracking && !calibrationPhase) {
          webgazer.getCurrentPrediction().then((pred) => {
            if (pred) {
              handleMove(pred.x, pred.y);
            }
          });
        }
      }, 50);
    }
  </script>
</body>
</html>
